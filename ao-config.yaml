port: 3000

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop

projects:
  ihhashi:
    repo: youngstunners88/ihhashi
    path: /home/user/ihhashi
    defaultBranch: master

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 2
  changes-requested:
    auto: true
    action: send-to-agent
  approved-and-green:
    auto: false
    action: notify
