version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ihhashi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-ihhashi}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-ihhashi_dev_2024}
      MONGO_INITDB_DATABASE: ihhashi
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ihhashi-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ihhashi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ihhashi-network

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ihhashi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - MONGODB_URL=mongodb://${MONGO_USERNAME:-ihhashi}:${MONGO_PASSWORD:-ihhashi_dev_2024}@mongodb:27017/ihhashi?authSource=admin
      - DB_NAME=ihhashi
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production_32chars}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:5173
      - DEBUG=true
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ihhashi-network

  # Frontend (Vite React - Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ihhashi-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_APP_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ihhashi-network

  # GlitchTip (Error Tracking) - Optional
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: ihhashi-glitchtip
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@glitchtip-db:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-glitchtip-secret-key-change-me}
      - PORT=8000
      - GLITCHTIP_DOMAIN=http://localhost:8001
      - DEFAULT_FROM_EMAIL=glitchtip@localhost
      - CELERY_WORKER_CONCURRENCY=2
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    networks:
      - ihhashi-network
    profiles:
      - monitoring

  glitchtip-db:
    image: postgres:15-alpine
    container_name: ihhashi-glitchtip-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=glitchtip
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    networks:
      - ihhashi-network
    profiles:
      - monitoring

  glitchtip-redis:
    image: redis:7-alpine
    container_name: ihhashi-glitchtip-redis
    restart: unless-stopped
    networks:
      - ihhashi-network
    profiles:
      - monitoring

  # PostgreSQL for Paperclip Swarm Governance
  paperclip-db:
    image: postgres:15-alpine
    container_name: ihhashi-paperclip-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=${PAPERCLIP_DB_PASSWORD:-paperclip_dev}
      - POSTGRES_DB=paperclip
    volumes:
      - paperclip_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ihhashi-network
    profiles:
      - swarm

volumes:
  mongodb_data:
  redis_data:
  glitchtip_db_data:
  paperclip_db_data:

networks:
  ihhashi-network:
    driver: bridge
