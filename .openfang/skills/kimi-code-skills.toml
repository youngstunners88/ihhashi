[skill.code_analysis]
name = "Code Analysis"
description = "Deep code understanding, refactoring, optimization"
capabilities = [
  "read_file",
  "write_file",
  "str_replace",
  "glob",
  "grep",
  "shell"
]
patterns = [
  "Analyze codebase structure",
  "Find bugs and issues",
  "Suggest optimizations",
  "Generate documentation"
]
quantum_mode = true
entangled_with = ["coder", "debugger", "code-reviewer"]

