# OpenFang Configuration
# iHhashi Unrestricted Chat Setup

[llm]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key = "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"

[llm.params]
temperature = 0.8
max_tokens = 8192
top_p = 0.95

[agent]
name = "iHhashi Assistant"
description = "24/7 autonomous assistant for iHhashi - unrestricted chat mode"

[channels.telegram]
enabled = true
bot_token = "8676557146:AAE70M-LACFLRQnJI6r7gPI6b7lj3zFfzsI"
parse_mode = "Markdown"
reply_to_messages = true

[memory]
enabled = true

[security]
level = "permissive"
sandbox = false

[tools]
enabled = ["shell", "http", "file", "swarm"]
allowlist = ["*"]

# Swarm Orchestrator Bridge
# Routes complex requests from Telegram users to the iHhashi Swarm
[tools.swarm]
name = "iHhashi Swarm"
description = "Delegates complex tasks to the iHhashi AI development swarm"
command = "bun /home/user/ihhashi/swarm/orchestrator/index.ts task"
timeout = 120
enabled = true

# Swarm Integration
[swarm]
enabled = true
orchestrator_path = "/home/user/ihhashi/swarm/orchestrator"
config_path = "/home/user/ihhashi/swarm/swarm.config.yaml"
context_path = "/home/user/ihhashi/swarm/context"
budget_daily_zar = 500
audit_log = "/home/user/ihhashi/swarm/state/audit.log"
