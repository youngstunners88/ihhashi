# 🌌 Quantum Configuration for OpenFang
[quantum]
enabled = true
mode = "entangled"
parallel_execution = true
max_parallel_agents = 16

[quantum.entanglement]
kimi_enabled = true
agents_enabled = true
auto_sync = true
sync_interval = "realtime"

[quantum.skills]
manifest = [
  "skills/kimi-code-skills.toml",
  "quantum/quantum-skills.toml"
]
auto_load = true
evolution_enabled = true

[quantum.mcp]
servers_file = "mcp/mcp-servers.json"
auto_start = true
health_check = true

[quantum.memory]
type = "entangled"
shared_context = true
persistence = "quantum_coherent"
consistency = "eventual"

[quantum.execution]
strategy = "swarm_intelligence"
consensus_threshold = 0.7
fallback = "best_effort"
timeout = "adaptive"
