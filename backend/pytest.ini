[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: marks tests as integration tests (may require external services)
    unit: marks tests as unit tests
    slow: marks tests as slow (deselect with '-m "not slow"')
